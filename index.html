/* ── RESET nav completely — override everything ── */
#navbar {
position:fixed !important; top:0 !important; width:100% !important;
background:#ffffff !important;
backdrop-filter:none !important;

}
#navbar.scrolled {

}
#navbar .nav-container {
max-width:1200px !important; margin:0 auto !important;
display:flex !important; align-items:center !important;
justify-content:space-between !important;
padding:0 24px !important;
height:64px !important;
flex-direction:row-reverse !important;
}
/* Logo — LEFT (visually) in row-reverse RTL */
#navbar .brand-logo {
font-size:20px !important; font-weight:700 !important;
color:#0c4a6e !important; text-decoration:none !important;
white-space:nowrap !important;

}
/* Accent word (e.g. "Dental") — glowing blue, same pattern as
   PioneersX's own "Pioneers[X]" logo treatment on the agency site */
#navbar .brand-logo .logo-accent {
color:#0ea5e9 !important;
animation: glowPulse 2s infinite;
}
/* Links — RIGHT, الرئيسية far right, تواصل معنا far left */
#navbar .nav-links {
display:flex !important; align-items:center !important;
gap:4px !important; list-style:none !important;
margin:0 !important; padding:0 !important;
flex-direction:row !important;
}
#navbar .nav-links li { margin:0 !important; padding:0 !important; }
#navbar .nav-links a {
color:#64748b !important; text-decoration:none !important;
font-size:14px !important; font-weight:500 !important;
padding:8px 16px !important; border-radius:8px !important;
transition:all .3s !important; display:block !important;
border:none !important; background:none !important;
box-shadow:none !important;
font-family:'Cairo',sans-serif !important;
}
#navbar .nav-links a:hover { color:#0c4a6e !important; background:#f0f9ff !important; }
#navbar .nav-links a::after,
#navbar .nav-links a::before { display:none !important; content:none !important; }
#navbar .nav-links a.active,
#navbar .nav-links li.active a,
#navbar .nav-links li:first-child a {
border:none !important; background:none !important;
color:#64748b !important; box-shadow:none !important;
}
/* Hide CTA completely */
#navbar .nav-cta { display:none !important; }
#navbar .mobile-menu-toggle {
display:none !important; font-size:1.4rem !important;
color:#0c4a6e !important; background:none !important;
border:none !important; order:1 !important;
}

/* ── HERO BUTTONS ── */
.hero-buttons .btn-primary {
background:#fff !important; color:#0c4a6e !important;
border:2px solid #fff !important; box-shadow:0 4px 16px rgba(0,0,0,.15) !important;
padding:14px 32px !important; border-radius:30px !important;
font-size:16px !important; font-weight:600 !important;
font-family:'Cairo',sans-serif !important;
text-decoration:none !important; display:inline-flex !important;
align-items:center !important; gap:8px !important;
cursor:none !important; transition:all .3s !important;
}
.hero-buttons .btn-primary:hover {
background:transparent !important; color:#fff !important;
transform:translateY(-2px) !important;
}

@media(max-width:900px){
#navbar .nav-links { display:none !important; }
#navbar .nav-links.open {
display:flex !important; flex-direction:column !important;
position:absolute !important; top:64px !important;
right:16px !important; left:16px !important;
background:#fff !important; border-radius:16px !important;
padding:12px !important; box-shadow:0 8px 32px rgba(0,0,0,.1) !important;
border:1px solid #e0f2fe !important; gap:2px !important; z-index:9999 !important;
}
#navbar .nav-links.open a { color:#0c4a6e !important; }
#navbar .mobile-menu-toggle { display:block !important; }
}
</style>

<script>
// Mobile menu toggle
document.getElementById('mobileMenu').addEventListener('click', function(){
document.getElementById('navLinks').classList.toggle('open');
});

// Smooth scroll — handles both #features and #section-features
document.addEventListener('click', function(e){
const a = e.target.closest('a[href^="#"]');
if (!a) return;
const raw = a.getAttribute('href');
if (!raw || raw === '#') return;
e.preventDefault();

const id = raw.slice(1); // e.g. "features" or "contact"

// Try direct id first, then with "section-" prefix
let target = document.getElementById(id)
|| document.getElementById('section-' + id)
|| document.querySelector(raw);

if (target) {
const offset = 70; // navbar height
const top = target.getBoundingClientRect().top + window.scrollY - offset;
window.scrollTo({ top, behavior: 'smooth' });
}

document.getElementById('navLinks').classList.remove('open');
});

// Nav scroll effect + scroll-to-top
window.addEventListener('scroll', function(){
document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
const st = document.getElementById('scrollTop');
if (st) st.classList.toggle('visible', window.scrollY > 400);
});
</script>
