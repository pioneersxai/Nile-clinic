<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="">

    <meta property="og:description" content="">

    <title>Loading...</title>
    <link rel="icon" type="image/svg+xml" id="favicon" href="">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
      /* ── NAV OVERRIDE — force correct layout ── */
      #navbar {
        position:fixed; top:0; width:100%;
        background:rgba(255,255,255,0.97);
        backdrop-filter:blur(12px);
        z-index:1000; padding:15px 0;
        border-bottom:1px solid #bae6fd;
        transition:all .3s;
      }
      #navbar.scrolled {
        padding:10px 0;
        box-shadow:0 2px 20px rgba(14,165,233,0.12);
      }
      #navbar .nav-container {
        max-width:1200px; margin:0 auto;
        display:flex; justify-content:space-between; align-items:center;
        padding:0 20px; flex-direction:row-reverse;
      }
      #navbar .brand-logo {
        font-size:20px; font-weight:700;
        color:#0c4a6e; text-decoration:none;
      }
      #navbar .nav-links {
        display:flex; gap:8px; list-style:none;
        margin:0; padding:0;
      }
      #navbar .nav-links a {
        color:#64748b; text-decoration:none;
        font-size:14px; font-weight:500;
        padding:7px 16px; border-radius:8px;
        transition:all .3s; display:block;
        border:1px solid transparent;
      }
      #navbar .nav-links a:hover,
      #navbar .nav-links li:first-child a {
        color:#0c4a6e;
        border-color:#0c4a6e;
      }
      #navbar .nav-cta {
        background:#0ea5e9; color:#fff;
        padding:9px 22px; border-radius:30px;
        text-decoration:none; font-size:14px; font-weight:600;
        transition:all .3s; white-space:nowrap;
        display:flex; align-items:center; gap:6px;
      }
      #navbar .nav-cta:hover { background:#0284c7; transform:translateY(-1px); }
      #navbar .mobile-menu-toggle { display:none; font-size:1.4rem; color:#0c4a6e; background:none; border:none; }

      /* ── HERO BUTTONS override ── */
      .hero-buttons .btn-primary {
        background:#fff !important; color:#0c4a6e !important;
        border:2px solid #fff !important;
      }
      .hero-buttons .btn-primary:hover {
        background:transparent !important; color:#fff !important;
      }

      @media(max-width:992px){
        #navbar .nav-links { display:none; }
        #navbar .nav-links.open {
          display:flex; flex-direction:column;
          position:absolute; top:65px; right:16px; left:16px;
          background:#fff; border-radius:16px;
          padding:16px; box-shadow:0 8px 32px rgba(0,0,0,.1);
          border:1px solid #bae6fd; gap:4px;
        }
        #navbar .nav-links.open a { color:#0c4a6e; border-color:transparent; }
        #navbar .mobile-menu-toggle { display:block; }
        #navbar .nav-cta { display:none; }
      }
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-outline" id="cursorOutline"></div>
    <div class="loader" id="loader"><div class="loader-spinner"></div></div>

    <!-- NAVBAR -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="#home" class="brand-logo"></a>
            <ul class="nav-links" id="navLinks"></ul>
            <a href="#contact" class="nav-cta" id="nav-book-btn">
                <i class="fas fa-calendar-check"></i>
                <span>احجز موعد</span>
            </a>
            <button class="mobile-menu-toggle" id="mobileMenu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" id="home">
        <div class="hero-content">
            <div class="hero-tag fade-in"></div>
            <h1 class="hero-title fade-in"></h1>
            <p class="tagline hero-tagline fade-in"></p>
            <p class="hero-description fade-in"></p>
            <div class="hero-buttons fade-in"></div>
        </div>
    </section>

    <!-- STATS -->
    <section class="stats section" id="section-stats">
        <div class="container">
            <div class="stats-grid"></div>
        </div>
    </section>

    <!-- FEATURES -->
    <section class="features section" id="section-features">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="medical-grid"></div>
        </div>
    </section>

    <!-- SERVICES -->
    <section class="services section" id="section-services">
        <div class="container">
            <div class="section-header">

                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="services-grid"></div>
        </div>
    </section>

    <!-- PRODUCTS -->
    <section class="products section" id="section-products">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="products-grid"></div>
        </div>
    </section>

    <!-- TEAM -->
    <section class="team section" id="section-team">

    <!-- PROCESS -->

        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="process-steps"></div>
        </div>
    </section>

    <!-- CASE STUDIES -->
    <section class="case-studies section" id="section-casestudies">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="case-studies-container"></div>
        </div>
    </section>

    <!-- CLIENTS -->
    <section class="clients section" id="section-clients">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="clients-grid"></div>
        </div>
    </section>

    <!-- TESTIMONIALS -->
    <section class="testimonials section" id="section-testimonials">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="testimonials-grid"></div>
        </div>
    </section>

    <!-- CTA -->
    <section class="cta section" id="section-cta">
        <div class="container">
            <h2 class="cta-title fade-in"></h2>

        </div>
    </section>

    <!-- CONTACT -->
    <section class="contact section" id="section-contact">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="contact-container">
                <div class="contact-info fade-in">
                    <h3>معلومات التواصل</h3>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-phone"></i></div>
                        <div class="contact-details"><h4>الهاتف</h4><p dir="ltr" class="contact-phone"></p></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-envelope"></i></div>

                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fab fa-whatsapp"></i></div>
                        <div class="contact-details"><h4>واتساب</h4><p><a class="contact-wa" href="#" target="_blank"></a></p></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="contact-details"><h4>العنوان</h4><p class="contact-city"></p></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-clock"></i></div>
                        <div class="contact-details"><h4>ساعات العمل</h4><p class="contact-hours"></p></div>
                    </div>
                </div>
                <form class="contact-form fade-in" id="contactForm">
                    <h3 class="form-title" style="margin-bottom:28px;color:#0c4a6e;font-size:1.4rem;font-weight:700;"></h3>
                    <div class="form-group"><label>الاسم الكامل *</label><input type="text" name="name" required></div>
                    <div class="form-group"><label>البريد الإلكتروني *</label><input type="email" name="email" required></div>
                    <div class="form-group"><label>رقم الهاتف *</label><input type="tel" name="phone" required></div>
                    <div class="form-group"><label>نوع الاستفسار</label>
                        <select id="service" name="service"></select>
                    </div>
                    <div class="form-group"><label>رسالتك *</label><textarea name="message" required></textarea></div>
                    <button type="submit" class="btn btn-primary" style="width:100%;background:#0ea5e9;color:#fff;border:none;padding:15px;border-radius:30px;font-size:1rem;font-weight:600;font-family:inherit;transition:all .3s;"></button>
                </form>
            </div>
        </div>
    </section>

    <!-- WHATSAPP FLOAT -->
    <a href="#" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <!-- FOOTER -->

                    <a id="footer-instagram" href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a id="footer-youtube"   href="#" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a id="footer-tiktok"    href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
            <div class="footer-dynamic-cols"></div>
            <div class="footer-section">
                <h3>تواصل معنا</h3>
                <p><i class="fas fa-envelope" style="color:#0ea5e9;margin-left:6px"></i> <a class="footer-contact-email" href="#" style="color:rgba(255,255,255,.5);text-decoration:none"></a></p>
                <p><i class="fas fa-phone" style="color:#0ea5e9;margin-left:6px"></i> <span class="footer-contact-phone" style="color:rgba(255,255,255,.5)"></span></p>
                <p><i class="fab fa-whatsapp" style="color:#25d366;margin-left:6px"></i> <a class="footer-contact-wa" href="#" style="color:rgba(255,255,255,.5);text-decoration:none"></a></p>
                <p><i class="fas fa-map-marker-alt" style="color:#0ea5e9;margin-left:6px"></i> <span class="footer-contact-city" style="color:rgba(255,255,255,.5)"></span></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="footer-copyright"></p>
        </div>

    <div class="scroll-top" id="scrollTop"><i class="fas fa-arrow-up"></i></div>

    <script src="config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/cursor.js"></script>
    <script>
      // Mobile menu toggle
      document.getElementById('mobileMenu').addEventListener('click', function(){
        document.getElementById('navLinks').classList.toggle('open');
      });

      // Smooth scroll for all anchor links
      document.addEventListener('click', function(e){
        const a = e.target.closest('a[href^="#"]');
        if(!a) return;
        e.preventDefault();
        const t = document.querySelector(a.getAttribute('href'));
        if(t) t.scrollIntoView({behavior:'smooth'});
        document.getElementById('navLinks').classList.remove('open');
      });

      // Nav scroll effect
      window.addEventListener('scroll', function(){
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 60);
        document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
      });
    </script>
</body>
